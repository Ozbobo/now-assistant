<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NOW</title>

  <!-- PWA / Add to Home Screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NOW" />
  <meta name="theme-color" content="#14171A" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Login (6-digit email code). Shown until a session exists. -->
  <div class="login-view" id="login-view" hidden>
    <div class="login-box">
      <h1>NOW</h1>
      <p class="login-sub">Sign in to your schedule.</p>
      <input type="email" id="login-email" class="login-input" placeholder="your@email.com"
             autocomplete="email" inputmode="email" />
      <button type="button" id="login-send" class="login-btn">Send code</button>
      <div class="login-code-row" id="login-code-row" hidden>
        <input type="text" id="login-code" class="login-input" placeholder="6-digit code"
               autocomplete="one-time-code" inputmode="numeric" maxlength="6" />
        <button type="button" id="login-verify" class="login-btn">Verify</button>
      </div>
      <p class="login-status" id="login-status" aria-live="polite"></p>
    </div>
  </div>

  <div class="wrap" id="app-wrap" hidden>
    <header class="masthead">
      <h1>NOW</h1>
      <span class="clock" id="clock">—</span>
    </header>

    <!-- RIGHT NOW -->
    <section class="card now-card" id="now-card">
      <div class="now-head">
        <span class="eyebrow">Right Now</span>
        <span class="now-tag" id="now-tag"></span>
      </div>
      <div class="range" id="now-range"></div>
      <div class="activity" id="now-activity"></div>
      <p class="note" id="now-note"></p>
    </section>

    <!-- UP NEXT -->
    <section class="card next-card">
      <span class="eyebrow">Up Next</span>
      <div class="range" id="next-range"></div>
      <div class="activity" id="next-activity"></div>
      <p class="note" id="next-note"></p>
    </section>

    <!-- CARRIED OVER (rendered only when there are carryover tasks) -->
    <div id="carryover-block"></div>

    <!-- THIS WEEK AT A GLANCE — 7-dot status strip -->
    <div class="week-bar" id="week-bar"></div>

    <!-- TODAY'S TASKS -->
    <h2 class="section-title">Today's Tasks</h2>
    <div class="task-list" id="task-list"></div>

    <!-- THIS WEEK -->
    <h2 class="section-title">This Week</h2>
    <div class="calendar" id="calendar"></div>

    <!-- WEEKLY STATS (rendered when history exists) -->
    <div id="weekly-stats"></div>

    <footer class="appfoot">
      <button class="refresh" id="refresh-btn" type="button">↻ Refresh</button>
      <button class="signout" id="signout-btn" type="button">Sign out</button>
    </footer>
  </div>

  <!-- Voice check-off — floating mic (hidden if the browser lacks SpeechRecognition) -->
  <button class="mic" id="mic-btn" type="button" aria-label="Check off tasks by voice" hidden>
    <svg class="mic-glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="9" y="2.5" width="6" height="11" rx="3" />
      <path d="M6 11a6 6 0 0 0 12 0" />
      <path d="M12 17v3" />
      <path d="M8.5 20h7" />
    </svg>
  </button>

  <!-- Toast container (success / no-match / error feedback) -->
  <div class="toast-wrap" id="toast-wrap" aria-live="polite"></div>

  <!-- tasks.js + app.js (classic) define data and the engine; supabase.js (module)
       runs last, wires auth + the data layer, and starts the app once signed in. -->
  <script src="tasks.js"></script>
  <script src="app.js"></script>
  <script type="module" src="supabase.js"></script>
</body>
</html>
